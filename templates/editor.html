<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncCode | Room {{ room }}</title>
    <!-- Use vanilla CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
</head>

<body class="editor-page">
    <div class="topbar glass-card">
        <div class="brand-mini">
            <div class="logo-icon mini">{' '}</div>
            <span>SyncCode</span>
        </div>

        <div class="room-info" title="Copy Room ID">
            <span class="label">Space:</span>
            <span class="value" id="room-id-display">{{ room }}</span>
            <button id="copy-room-btn" class="icon-btn" title="Copy Room ID">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M8 16H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v2"></path>
                    <rect x="8" y="8" width="12" height="12" rx="2" ry="2"></rect>
                </svg>
            </button>
        </div>

        <div class="execution-controls">
            <select id="language-selector" class="lang-select">
                <option value="python">Python</option>
                <option value="javascript">JavaScript</option>
                <option value="c">C</option>
                <option value="c++">C++</option>
                <option value="java">Java</option>
            </select>
            <button id="run-btn" class="run-btn">
                <span class="icon">▶</span> Run Code
            </button>
        </div>

        <div class="user-info">
            <div class="username-badge">
                <span class="user-avatar" id="avatar">{{ username[0] | upper }}</span>
                {{ username }}
            </div>
            <button id="theme-toggle" class="theme-toggle" type="button" title="Toggle Theme">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <path
                        d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42">
                    </path>
                </svg>
                <span id="theme-label">Dark</span>
            </button>
            <a href="{{ url_for('dashboard', tab=tab) }}" class="icon-btn leave-btn" title="Leave Room">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
            </a>
            <button id="chat-toggle" class="icon-btn chat-toggle" title="Open chat">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
                <span id="chat-badge" class="chat-badge hidden"></span>
            </button>
            <button id="participants-toggle" class="icon-btn participants-toggle" title="Open participants sidebar">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
                <span class="participant-count" id="participant-count">1</span>
            </button>
        </div>
    </div>

    <div class="main-workspace" id="main-workspace">
        <div class="left-column" id="left-column">
            <div class="editor-content-wrapper" id="editor-wrapper">
                <div id="editor-container" class="glass-card">
                    <!-- Monaco Editor mounted here via JS -->
                </div>
            </div>
            
            <div class="resize-vertical" id="resize-vertical"></div>

            <div class="output-panel glass-card" id="output-wrapper">
                <div class="io-container">
                    <div class="stdin-section">
                        <div class="output-header">
                            <span>Standard Input</span>
                        </div>
                        <textarea id="stdin-input" placeholder="Enter input here..." spellcheck="false"></textarea>
                    </div>
                    <div class="stdout-section">
                        <div class="output-header">
                            <span>Terminal Output</span>
                            <button id="clear-btn" class="clear-btn">Clear</button>
                        </div>
                        <pre id="output-console">Waiting for execution...</pre>
                    </div>
                </div>
            </div>
        </div>

        <div class="resize-horizontal" id="resize-horizontal" style="display: none;"></div>

        <div class="right-pane glass-card" id="right-pane" style="display: flex;">
            <!-- Participants Section -->
            <div class="sidebar-section participants-section">
                <div class="section-header">
                    <span>Participants</span>
                    <span class="participant-count badge" id="sidebar-participant-count">1</span>
                </div>
                <div class="participants-list" id="participants-list">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Chat Section -->
            <div class="sidebar-section chat-section">
                <div class="section-header">
                    <span>Room Chat</span>
                </div>
                <div class="chat-messages" id="chat-messages">
                    <!-- Chat messages go here -->
                </div>
                <div class="chat-input-container">
                    <label for="file-upload" class="icon-btn attach-btn" title="Attach file" style="cursor: pointer;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                        </svg>
                    </label>
                    <input type="file" id="file-upload" style="display: none;">
                    <input type="text" id="chat-input" placeholder="Message room..." autocomplete="off">
                    <button id="send-chat-btn" class="icon-btn send-btn" title="Send message">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        
        <div id="sidebar-backdrop" class="sidebar-backdrop"></div>
    </div>

    <!-- Hidden state inputs for JavaScript to pick up -->
    <input type="hidden" id="current-username" value="{{ username }}">
    <input type="hidden" id="current-room" value="{{ room }}">

    <!-- Socket.IO Client via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>

    <!-- Monaco Editor Scripts via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.38.0/min/vs/loader.min.js"></script>

    <!-- Our custom logic -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        // Theme toggle functionality
        window.updateEditorTheme = function() { };
        const themeToggle = document.getElementById('theme-toggle');
        const themeLabel = document.getElementById('theme-label');
        if (themeToggle && themeLabel) {
            // Load saved theme
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light-mode');
                themeLabel.textContent = 'Light';
            } else {
                themeLabel.textContent = 'Dark';
            }
            // Event listener attached in script.js after Monaco loads
        }

        (function() {
            const storageKey = 'synccode_tab_id';
            let tabId = sessionStorage.getItem(storageKey);
            if (!tabId) {
                tabId = crypto.randomUUID ? crypto.randomUUID() : 'tab-' + Math.random().toString(36).slice(2, 12);
                sessionStorage.setItem(storageKey, tabId);
            }

            const currentUrl = new URL(window.location.href);
            if (!currentUrl.searchParams.get('tab')) {
                currentUrl.searchParams.set('tab', tabId);
                window.history.replaceState(null, '', currentUrl.toString());
            } else {
                tabId = currentUrl.searchParams.get('tab');
                sessionStorage.setItem(storageKey, tabId);
            }

            document.querySelectorAll('a[href]').forEach(link => {
                const href = link.getAttribute('href');
                if (!href || href.startsWith('mailto:') || href.startsWith('tel:')) return;
                try {
                    const linkUrl = new URL(href, window.location.origin);
                    if (linkUrl.origin !== window.location.origin) return;
                    linkUrl.searchParams.set('tab', tabId);
                    link.setAttribute('href', linkUrl.pathname + linkUrl.search + linkUrl.hash);
                } catch (e) {
                    // ignore malformed URLs
                }
            });
        })();
</html>
