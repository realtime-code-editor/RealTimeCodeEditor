<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncCode | Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="join-page">
    <div class="glass-card join-container">
        <div class="brand">
            <div class="logo-icon">{' '}</div>
            <h1>SyncCode</h1>
            <button id="theme-toggle" class="theme-toggle" title="Toggle Theme">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
                </svg>
                <span id="theme-label">Dark</span>
            </button>
        </div>
        <p class="subtitle">Secure collaboration starts with an account.</p>

        <div class="tabs-header">
            <button class="tab-btn {{ 'active' if action != 'signup' else '' }}" id="tab-login">Login</button>
            <button class="tab-btn {{ 'active' if action == 'signup' else '' }}" id="tab-signup">Signup</button>
        </div>

        {% if error %}
            <div class="error-box">{{ error }}</div>
        {% endif %}
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="success-box">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}

        <form id="login-form" action="/login" method="POST" class="tab-content {{ 'active' if action != 'signup' else '' }}">
            <div class="input-group">
                <input type="text" name="username" placeholder="Username" required autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required autocomplete="off">
            </div>
            <button type="submit" class="primary-btn">Login</button>
        </form>

        <form id="signup-form" action="/signup" method="POST" class="tab-content {{ 'active' if action == 'signup' else '' }}">
            <div class="input-group">
                <input type="text" name="username" placeholder="Choose a Username" required autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" name="confirm_password" placeholder="Confirm Password" required autocomplete="off">
            </div>
            <button type="submit" class="primary-btn secondary">Signup</button>
        </form>
    </div>

    <script>
        const tabLogin = document.getElementById('tab-login');
        const tabSignup = document.getElementById('tab-signup');
        const loginForm = document.getElementById('login-form');
        const signupForm = document.getElementById('signup-form');

        tabLogin.addEventListener('click', () => {
            tabLogin.classList.add('active');
            tabSignup.classList.remove('active');
            loginForm.classList.add('active');
            signupForm.classList.remove('active');
        });

        tabSignup.addEventListener('click', () => {
            tabSignup.classList.add('active');
            tabLogin.classList.remove('active');
            signupForm.classList.add('active');
            loginForm.classList.remove('active');
        });

        // Theme toggle functionality
        const themeToggle = document.getElementById('theme-toggle');
        const themeLabel = document.getElementById('theme-label');
        if (themeToggle && themeLabel) {
            // Load saved theme
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light-mode');
                themeLabel.textContent = 'Light';
            } else {
                themeLabel.textContent = 'Dark';
            }

            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('light-mode');
                const isLight = document.body.classList.contains('light-mode');
                localStorage.setItem('theme', isLight ? 'light' : 'dark');
                themeLabel.textContent = isLight ? 'Light' : 'Dark';
            });
        }
    </script>
</body>
</html>
