<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncCode | Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="join-page">
    <div class="glass-card join-container">
        <div class="brand">
            <div class="logo-icon">{' '}</div>
            <h1>SyncCode</h1>
            <button id="theme-toggle" class="theme-toggle" title="Toggle Theme">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
                </svg>
                <span id="theme-label">Dark</span>
            </button>
        </div>
        <p class="subtitle">Welcome back, <strong>{{ username }}</strong>. Create a new room or join an existing one.</p>
        <p class="subtitle">Last login date: <strong>{{ last_login_at or 'N/A' }}</strong></p>

        <div class="tabs-header">
            <button class="tab-btn active" id="tab-create">Create Room</button>
            <button class="tab-btn" id="tab-join">Join Room</button>
        </div>

        <form id="create-form" action="/create-room" method="POST" class="tab-content active">
            <button type="submit" class="primary-btn">Create New Room</button>
        </form>

        <form id="join-form" action="/editor" method="GET" class="tab-content">
            <div class="input-group">
                <input type="text" id="join-room" name="room" placeholder="Room ID (e.g. QBPNNN)" required autocomplete="off">
            </div>
            <button type="submit" class="primary-btn secondary">Join Room</button>
        </form>

        <div class="footer-row">
            <p class="subtitle">Not you? <a href="{{ url_for('logout') }}">Logout</a></p>
        </div>
    </div>

    <script>
        const tabCreate = document.getElementById('tab-create');
        const tabJoin = document.getElementById('tab-join');
        const formCreate = document.getElementById('create-form');
        const formJoin = document.getElementById('join-form');

        tabCreate.addEventListener('click', () => {
            tabCreate.classList.add('active');
            tabJoin.classList.remove('active');
            formCreate.classList.add('active');
            formJoin.classList.remove('active');
        });

        tabJoin.addEventListener('click', () => {
            tabJoin.classList.add('active');
            tabCreate.classList.remove('active');
            formJoin.classList.add('active');
            formCreate.classList.remove('active');
        });

        // Theme toggle functionality
        const themeToggle = document.getElementById('theme-toggle');
        const themeLabel = document.getElementById('theme-label');
        if (themeToggle && themeLabel) {
            // Load saved theme
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light-mode');
                themeLabel.textContent = 'Light';
            } else {
                themeLabel.textContent = 'Dark';
            }

            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('light-mode');
                const isLight = document.body.classList.contains('light-mode');
                localStorage.setItem('theme', isLight ? 'light' : 'dark');
                themeLabel.textContent = isLight ? 'Light' : 'Dark';
            });
        }
    </script>
</body>
</html>
